name: Build Windows App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        id: py
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install UPX
        run: choco install upx -y --no-progress

      - name: Build Windows exe
        working-directory: dynaface-app/deploy/windows
        shell: pwsh
        env:
          # build.ps1 defaults to `python3.11`, which the runner doesn't expose;
          # point it at the interpreter actions/setup-python installed.
          PYTHON_EXE: ${{ steps.py.outputs.python-path }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./build.ps1

      - name: Package and publish to S3
        working-directory: dynaface-app/deploy/windows
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          $ver = (Select-String -Path ../../version.py -Pattern 'VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $zip = "dynaface-$ver.zip"
          Compress-Archive -Path working/dist/dynaface.exe -DestinationPath $zip -Force
          $dest = "s3://data.heatonresearch.com/library/$zip"
          Write-Host "Uploading $zip -> $dest"
          aws s3 cp $zip $dest --acl public-read
