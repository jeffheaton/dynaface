name: Build Library (.NET)

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  # Required for NuGet Trusted Publishing: lets the NuGet/login action request a
  # short-lived OIDC token from GitHub to exchange for a temporary NuGet API key.
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: dynaface-lib-dotnet
        run: dotnet restore FacialDll.sln

      - name: Check formatting
        working-directory: dynaface-lib-dotnet
        run: dotnet format FacialDll.sln --verify-no-changes --report format-report

      - name: Upload formatting report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: format-report
          retention-days: 7
          path: dynaface-lib-dotnet/format-report
          if-no-files-found: ignore

      - name: Check for vulnerable packages
        working-directory: dynaface-lib-dotnet
        continue-on-error: true
        run: dotnet list DynafaceTests/DynafaceTests.csproj package --vulnerable --include-transitive | tee vulnerable-packages-report.txt

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vulnerability-report
          retention-days: 7
          path: dynaface-lib-dotnet/vulnerable-packages-report.txt
          if-no-files-found: ignore

      - name: Generate version file
        working-directory: dynaface-lib-dotnet
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' facial_dll/FacialDll.csproj)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S%z")
          BUILD="${{ github.run_number }}"

          cat <<EOF > facial_dll/Version.cs
          // Note, this file is auto-generated by the build process.
          public static class DynafaceVersion
          {
              public const string Version = "$VERSION";
              public const string BuildDate = "$BUILD_DATE";
              public const int Build = $BUILD;
          }
          EOF

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Generated facial_dll/Version.cs:"
          cat facial_dll/Version.cs

      - name: Build (Release)
        working-directory: dynaface-lib-dotnet
        run: dotnet build FacialDll.sln -c Release --no-restore -p:Version=$VERSION

      - name: Run tests
        working-directory: dynaface-lib-dotnet
        run: |
          dotnet test DynafaceTests/DynafaceTests.csproj -c Release --no-build \
            --logger "trx;LogFileName=test_results.trx" \
            --results-directory TestResults
        # Model-gated integration tests self-skip here (no local .onnx files in
        # CI) — see DynafaceTests/ModelPathResolver.cs. Set DYNAFACE_ONNX_MODELS
        # (and provide the 3 models via a prior step) if you want them to run.

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Test Results
          path: dynaface-lib-dotnet/TestResults/*.trx
          reporter: dotnet-trx

      - name: Package library artifact
        working-directory: dynaface-lib-dotnet
        run: |
          mkdir -p dist
          cp facial_dll/bin/Release/netstandard2.1/FacialDll.dll dist/
          cp facial_dll/bin/Release/netstandard2.1/FacialDll.pdb dist/ 2>/dev/null || true
          cd dist && zip -r "../dynaface-dotnet-${VERSION}.zip" .

      - name: Upload library artifact
        uses: actions/upload-artifact@v7
        with:
          name: dynaface-dotnet-dll
          retention-days: 7
          path: dynaface-lib-dotnet/dynaface-dotnet-*.zip

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          aws s3 cp dynaface-lib-dotnet/dynaface-dotnet-${VERSION}.zip s3://data.heatonresearch.com/library/ --acl public-read

      - name: Pack NuGet packages (Dynaface + Dynaface.Onnx)
        working-directory: dynaface-lib-dotnet
        run: |
          dotnet pack facial_dll/FacialDll.csproj -c Release --no-build \
            -p:Version=$VERSION -o nupkgs
          dotnet pack FacialDll.Onnx/FacialDll.Onnx.csproj -c Release --no-build \
            -p:Version=$VERSION -o nupkgs
          ls -l nupkgs

      - name: Upload NuGet packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: dynaface-nupkgs
          retention-days: 7
          path: dynaface-lib-dotnet/nupkgs/*.nupkg

      # Trusted Publishing: exchange GitHub's OIDC token for a short-lived NuGet
      # API key (no long-lived secret stored in the repo). Requires a matching
      # trusted-publishing policy on NuGet.org for both package IDs — see README.
      - name: NuGet login (Trusted Publishing / OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: jeffheaton

      - name: Push to NuGet.org
        working-directory: dynaface-lib-dotnet
        run: |
          dotnet nuget push "nupkgs/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Clean up build artifacts
        if: always()
        working-directory: dynaface-lib-dotnet
        run: rm -rf dist nupkgs TestResults format-report facial_dll/bin facial_dll/obj FacialDll.Onnx/bin FacialDll.Onnx/obj FacialDllConsole/bin FacialDllConsole/obj DynafaceTests/bin DynafaceTests/obj
